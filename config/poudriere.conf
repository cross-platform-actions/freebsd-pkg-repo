# Disable ZFS -- the FreeBSD VM has no ZFS pool
NO_ZFS=yes

# Base directory for poudriere data
BASEFS=/usr/local/poudriere

# Where packages and logs are stored
POUDRIERE_DATA=${BASEFS}/data

# Use tmpfs for work directories to improve build speed and reduce disk I/O
USE_TMPFS=wrkdir

# Allow parallel make jobs within each port build
ALLOW_MAKE_JOBS=yes

# FreeBSD download mirror for jail creation
FREEBSD_HOST=https://download.FreeBSD.org

# Use the host's DNS configuration
RESOLV_CONF=/etc/resolv.conf

# Hostname for reproducible builds
BUILDER_HOSTNAME=pkg-builder

# Distfiles cache
DISTFILES_CACHE=/usr/local/poudriere/distfiles
